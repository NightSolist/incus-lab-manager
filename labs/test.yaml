name: web-dev-lab
description: "Minimal infrastructure setup: one network and two containers"

networks:
  - name: lab-net
    ipv4: 10.99.0.1/24
    ipv6: none
    dns_domain: lab.local

instances:
  - name: db-node
    type: container
    image: images:alpine/3.20
    network: lab-net
    start: true

  - name: web-node
    type: container
    image: images:alpine/3.20
    network: lab-net
    start: true