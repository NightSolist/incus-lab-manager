# Self-hosted Woodpecker CI/CD pipeline для автоматически
# сгенерированных Rust DTO-моделей Incus.
#
# Запускается при push или вручную через REST API.
# Выполняет независимую compile-time валидацию и нотификацию.

when:
  - event: push
  - event: manual

steps:

  - name: cargo-check
    image: rust:1.83
    commands:
      - rustc --version
      - cargo --version
      - echo "▶ Compile-time валидация автоматически сгенерированных DTO..."
      - cargo check --all-targets
      - echo "✓ cargo check passed"

  - name: cargo-fmt
    image: rust:1.83
    commands:
      - rustup component add rustfmt
      - echo "▶ Проверка форматирования сгенерированного кода..."
      - cargo fmt --all -- --check || echo "⚠ Форматирование требует внимания (не критично)"
      - echo "✓ Проверка форматирования завершена"

  - name: notify-engineer
    image: deblan/woodpecker-email
    environment:
      PLUGIN_DSN:
        from_secret: email_dsn
      PLUGIN_FROM_ADDRESS:
        from_secret: email_username
      PLUGIN_FROM_NAME: Incus Sync Bot
      PLUGIN_RECIPIENTS:
        from_secret: email_recipient
      PLUGIN_RECIPIENTS_ONLY: "true"
      PLUGIN_CONTENT_TYPE: text/plain
      PLUGIN_SUBJECT: "Incus Sync CI: ветка ${CI_COMMIT_BRANCH} прошла проверку"
      PLUGIN_BODY: |
        Здравствуйте!

        Self-hosted Woodpecker CI/CD завершил проверку
        автоматически сгенерированных Rust DTO-моделей Incus.

        Сводка:
          • Репозиторий:   ${CI_REPO}
          • Branch:        ${CI_COMMIT_BRANCH}
          • Commit:        ${CI_COMMIT_SHA}
          • Pipeline:      ${CI_PIPELINE_URL}

        Этапы проверки:
          ✓ cargo check (compile-time validation)
          ✓ cargo fmt (форматирование)
          ✓ Email-уведомление инженеру

        Pull Request готов к review и merge.

        —
        Incus Sync CI Bot
        Self-hosted Woodpecker CI/CD
    when:
      - status: success

  - name: notify-failure
    image: deblan/woodpecker-email
    environment:
      PLUGIN_DSN:
        from_secret: email_dsn
      PLUGIN_FROM_ADDRESS:
        from_secret: email_username
      PLUGIN_FROM_NAME: Incus Sync Bot
      PLUGIN_RECIPIENTS:
        from_secret: email_recipient
      PLUGIN_RECIPIENTS_ONLY: "true"
      PLUGIN_CONTENT_TYPE: text/plain
      PLUGIN_SUBJECT: "Incus Sync CI: ветка ${CI_COMMIT_BRANCH} требует внимания"
      PLUGIN_BODY: |
        Здравствуйте!

        Self-hosted Woodpecker CI/CD обнаружил проблемы в
        автоматически сгенерированных Rust DTO-моделях Incus.

        Сводка:
          • Branch:        ${CI_COMMIT_BRANCH}
          • Pipeline:      ${CI_PIPELINE_URL}

        Требуется ручное вмешательство.
    when:
      - status: failure