when:
  - event: push
  - event: pull_request
  - event: manual

steps:
  # ------------------------------------------------------------
  # 1. Компиляционная проверка
  # ------------------------------------------------------------
  - name: cargo-check
    image: rust:1.83
    commands:
      - rustc --version
      - cargo --version
      - echo "▶ Compile-time validation of Incus DTO..."
      - cargo check --all-targets
      - echo "✅ cargo check passed"

  # ------------------------------------------------------------
  # 2. Проверка форматирования
  # ------------------------------------------------------------
  - name: cargo-fmt-check
    image: rust:1.83
    commands:
      - rustup component add rustfmt
      - echo "▶ Checking Rust formatting..."
      - cargo fmt --all -- --check
      - echo "✅ cargo fmt check passed"
    depends_on:
      - cargo-check

  # ------------------------------------------------------------
  # 3. Unit-тесты DTO
  # ------------------------------------------------------------
  - name: cargo-test-serde
    image: rust:1.83
    commands:
      - echo "▶ Running serde DTO unit tests..."
      - cargo test --test serde_dto -- --nocapture
      - echo "✅ serde DTO tests passed"
    depends_on:
      - cargo-fmt-check

  # ------------------------------------------------------------
  # 4. Уведомление об успехе
  # ------------------------------------------------------------
  - name: notify-success
    image: python:3.12-slim
    environment:
      SMTP_HOST:
        from_secret: smtp_host
      SMTP_PORT:
        from_secret: smtp_port
      SMTP_USER:
        from_secret: email_username
      SMTP_PASS:
        from_secret: smtp_pass
      NOTIFY_EMAIL:
        from_secret: email_recipient
      NOTIFY_FROM: "Incus Rust CI Bot"
    commands:
      - |
        python -c "
        import os, smtplib, ssl
        from email.message import EmailMessage

        pipeline_number = os.environ.get('CI_PIPELINE_NUMBER', '?')
        pipeline_url    = os.environ.get('CI_PIPELINE_URL', '')
        repo            = os.environ.get('CI_REPO', '')
        commit_sha      = os.environ.get('CI_COMMIT_SHA', '')
        branch          = os.environ.get('CI_COMMIT_BRANCH', '')
        event           = os.environ.get('CI_PIPELINE_EVENT', '')

        smtp_host    = os.environ['SMTP_HOST']
        smtp_port    = int(os.environ['SMTP_PORT'])
        smtp_user    = os.environ['SMTP_USER']
        smtp_pass    = os.environ['SMTP_PASS']
        notify_email = os.environ['NOTIFY_EMAIL']
        from_name    = os.environ.get('NOTIFY_FROM', 'Incus Rust CI Bot')

        subject = (
            f'incus-lab-manager CI: проверка пройдена '
            f'(pipeline #{pipeline_number})'
        )

        body = (
            'Здравствуйте!\n\n'
            'CI pipeline для incus-lab-manager успешно завершён.\n\n'
            'Выполненные проверки:\n'
            '  - cargo check --all-targets\n'
            '  - cargo fmt --all -- --check\n'
            '  - cargo test --test serde_dto\n\n'
            'Сводка:\n'
            f'  - Репозиторий: {repo}\n'
            f'  - Ветка: {branch}\n'
            f'  - Коммит: {commit_sha}\n'
            f'  - Событие: {event}\n'
            f'  - Pipeline: {pipeline_url}\n\n'
            'Integration-тесты с реальным Incus в CI не запускаются.\n'
            'Они выполняются локально вручную.\n\n'
            '--\n'
            'Incus Rust CI Bot\n'
        )

        msg = EmailMessage()
        msg['Subject'] = subject
        msg['From'] = f'{from_name} <{smtp_user}>'
        msg['To'] = notify_email
        msg.set_content(body)

        ctx = ssl.create_default_context()
        if smtp_port == 465:
            with smtplib.SMTP_SSL(smtp_host, smtp_port, context=ctx) as s:
                s.login(smtp_user, smtp_pass)
                s.send_message(msg)
        else:
            with smtplib.SMTP(smtp_host, smtp_port) as s:
                s.starttls(context=ctx)
                s.login(smtp_user, smtp_pass)
                s.send_message(msg)

        print(f'Success email sent to {notify_email}')
        "
    when:
      - status: success
    depends_on:
      - cargo-test-serde

  # ------------------------------------------------------------
  # 5. Уведомление об ошибке
  # ------------------------------------------------------------
  - name: notify-failure
    image: python:3.12-slim
    environment:
      SMTP_HOST:
        from_secret: smtp_host
      SMTP_PORT:
        from_secret: smtp_port
      SMTP_USER:
        from_secret: email_username
      SMTP_PASS:
        from_secret: smtp_pass
      NOTIFY_EMAIL:
        from_secret: email_recipient
      NOTIFY_FROM: "Incus Rust CI Bot"
    commands:
      - |
        python -c "
        import os, smtplib, ssl
        from email.message import EmailMessage

        pipeline_number = os.environ.get('CI_PIPELINE_NUMBER', '?')
        pipeline_url    = os.environ.get('CI_PIPELINE_URL', '')
        repo            = os.environ.get('CI_REPO', '')
        commit_sha      = os.environ.get('CI_COMMIT_SHA', '')
        branch          = os.environ.get('CI_COMMIT_BRANCH', '')
        event           = os.environ.get('CI_PIPELINE_EVENT', '')

        smtp_host    = os.environ['SMTP_HOST']
        smtp_port    = int(os.environ['SMTP_PORT'])
        smtp_user    = os.environ['SMTP_USER']
        smtp_pass    = os.environ['SMTP_PASS']
        notify_email = os.environ['NOTIFY_EMAIL']
        from_name    = os.environ.get('NOTIFY_FROM', 'Incus Rust CI Bot')

        subject = (
            f'incus-lab-manager CI: проверка не пройдена '
            f'(pipeline #{pipeline_number})'
        )

        body = (
            'Здравствуйте!\n\n'
            'CI pipeline для incus-lab-manager завершился с ошибкой.\n\n'
            'Возможные этапы отказа:\n'
            '  - cargo check --all-targets\n'
            '  - cargo fmt --all -- --check\n'
            '  - cargo test --test serde_dto\n\n'
            'Сводка:\n'
            f'  - Репозиторий: {repo}\n'
            f'  - Ветка: {branch}\n'
            f'  - Коммит: {commit_sha}\n'
            f'  - Событие: {event}\n'
            f'  - Pipeline: {pipeline_url}\n\n'
            'Это означает, что недавно сгенерированные Rust DTO\n'
            'или код проекта incus-lab-manager стали несовместимы.\n'
            'Требуется анализ логов pipeline.\n\n'
            '--\n'
            'Incus Rust CI Bot\n'
        )

        msg = EmailMessage()
        msg['Subject'] = subject
        msg['From'] = f'{from_name} <{smtp_user}>'
        msg['To'] = notify_email
        msg.set_content(body)

        ctx = ssl.create_default_context()
        if smtp_port == 465:
            with smtplib.SMTP_SSL(smtp_host, smtp_port, context=ctx) as s:
                s.login(smtp_user, smtp_pass)
                s.send_message(msg)
        else:
            with smtplib.SMTP(smtp_host, smtp_port) as s:
                s.starttls(context=ctx)
                s.login(smtp_user, smtp_pass)
                s.send_message(msg)

        print(f'Failure email sent to {notify_email}')
        "
    when:
      - status: failure
    depends_on:
      - cargo-check
      - cargo-fmt-check
      - cargo-test-serde